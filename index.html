*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f3ee;--surface:#fffcf8;--card:#fffcf8;
  --border:#ede5d8;--border2:#e0d5c4;
  --text:#1c1814;--muted:#8c7d6e;--muted2:#b5a898;
  --gold:#b8935a;--gold-light:#f5ead8;--gold-border:#dfc99a;
  --green:#4a7c5f;--green-light:#e6f0ea;--green-border:#aacbb8;
  --blue:#5476b8;--blue-light:#eaeff8;--blue-border:#aabce0;
  --ig:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;min-height:100vh;padding-bottom:80px}
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 4px}
.nav-btn{flex:1;padding:12px 4px 10px;border:none;background:none;color:var(--muted2);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-icon{font-size:18px}
.header{padding:18px 16px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.header-handle{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:3px}
.header-title{font-size:21px;font-weight:300;color:var(--text);letter-spacing:-.01em}
.header-meta{font-size:12px;color:var(--muted);margin-top:2px}
.panel{display:none;padding:16px}.panel.active{display:block}
.section-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted2);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(120,90,50,.06)}
.photo-wrap{width:100%;border-radius:12px;overflow:hidden;background:#f0ebe3;margin-bottom:12px}
.photo-wrap img{width:100%;display:block;object-fit:cover}
.photo-wrap.feed{aspect-ratio:4/5}.photo-wrap.story{aspect-ratio:9/16}
.photo-no-img{display:flex;align-items:center;justify-content:center;min-height:80px;font-size:12px;color:var(--muted2);font-style:italic;padding:20px}
.caption-box{background:rgba(184,147,90,.06);border:1px solid var(--gold-border);border-radius:10px;padding:13px;font-size:14px;line-height:1.65;color:var(--text);margin-bottom:8px;font-style:italic}
.story-cap-box{background:rgba(0,0,0,.03);border:1px dashed var(--border2);border-radius:10px;padding:11px;font-size:13px;line-height:1.6;color:var(--muted);margin-bottom:8px}
.tags{font-size:11px;color:var(--gold);opacity:.7;margin-bottom:12px;line-height:1.9}
.overlay-text{background:rgba(28,24,20,.06);border-radius:8px;padding:10px 12px;font-size:13px;font-style:italic;color:var(--muted);margin-bottom:12px;border-left:2px solid var(--gold)}
.song-info{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--gold);background:var(--gold-light);border:1px solid var(--gold-border);border-radius:8px;padding:8px 11px;margin-bottom:8px}
.btn{width:100%;padding:11px 16px;border-radius:10px;border:none;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;margin-bottom:7px;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:#fff}
.btn-outline{background:var(--gold-light);color:var(--gold);border:1px solid var(--gold-border)}
.btn-green{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
.btn-blue{background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-border)}
.btn-ig{background:var(--ig);color:#fff}
.posted-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green-light);border:1px solid var(--green-border);color:var(--green);padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;margin-bottom:12px}
.week-pill{display:inline-flex;background:rgba(0,0,0,.04);border:1px solid var(--border);color:var(--muted);font-size:10px;padding:3px 10px;border-radius:20px;margin-bottom:12px}
.lock-box{background:var(--gold-light);border:1px solid var(--gold-border);border-radius:12px;padding:13px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
.lock-box b{color:var(--gold)}
.loc-badge{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:10px;padding:3px 8px;border-radius:20px;margin-bottom:12px;margin-left:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.cal-dow{font-size:9px;color:var(--muted2);text-align:center;font-weight:600;padding:3px 0}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:1px solid transparent;transition:.12s;position:relative;flex-direction:column}
.cal-day.empty{cursor:default}
.cal-day.today{border-color:var(--gold);color:var(--gold);font-weight:600}
.cal-day.posted{background:var(--green-light);border-color:var(--green-border);color:var(--green)}
.cal-day.scheduled{background:rgba(184,147,90,.07);color:var(--muted)}
.cal-day.active-day{background:var(--gold);color:#fff;font-weight:600}
.cal-dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.6;margin-top:1px}
.cal-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.cal-legend-dot{width:8px;height:8px;border-radius:50%}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:.3s}
.story-item{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.story-item:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0}
.story-num{font-size:9px;color:var(--muted2);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.copy-sm{background:none;border:1px solid var(--border2);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer}
.reel-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.reel-num{width:32px;height:32px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted2);flex-shrink:0}
.reel-content{flex:1;min-width:0}
.reel-title{font-size:11px;font-weight:500;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.reel-overlay{font-size:12px;font-style:italic;color:var(--text);margin-bottom:6px;line-height:1.4}
.reel-copy{background:var(--gold-light);color:var(--gold);border:1px solid var(--gold-border);padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer}
.open-link{display:block;text-align:center;font-size:10px;color:var(--blue);padding:4px 0;text-decoration:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.t-green{background:var(--green)}.toast.t-blue{background:var(--blue)}
a.btn{box-sizing:border-box}
</style>

function getPosted(){try{return JSON.parse(localStorage.getItem('dp4_posted')||'{}')}catch(e){return{}}}
function setPosted(k,v){var p=getPosted();p[k]=v;localStorage.setItem('dp4_posted',JSON.stringify(p))}
function isPosted(k){return!!getPosted()[k]}
function dayKey(n){return'day_'+n}
function getCurrentDay(){
  var t=new Date();t.setHours(0,0,0,0);
  var s=new Date(START);s.setHours(0,0,0,0);
  var d=Math.floor((t-s)/86400000)+1;
  return Math.max(1,Math.min(((d-1)%TOTAL)+1,TOTAL));
}
function getActiveDay(){
  var cur=getCurrentDay();
  for(var i=1;i<=cur;i++){if(!isPosted(dayKey(i)))return i;}
  return cur;
}
function copy(text,label,cls){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){showToast(label||'Copied',cls)}).catch(function(){showToast('Copied',cls)});
  }else{showToast('Copied',cls)}
}
function shareToIG(photoId,caption){
  copy(caption,'Caption copied — open Drive ↑','t-blue');
  setTimeout(function(){window.open(driveUrl(photoId),'_blank')},350);
}
function showToast(msg,cls){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(cls||'');t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2200);
}
function markPosted(dayNum){
  setPosted(dayKey(dayNum),true);renderToday();renderCalendar();
  showToast('Day '+dayNum+' posted ✓','t-green');
}
function escQ(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n')}

function buildDay(d,dayNum,compact){
  if(!d)return'<div style="text-align:center;padding:40px;color:var(--muted2);font-style:italic">No post</div>';
  var posted=isPosted(dayKey(dayNum));
  var active=getActiveDay();
  var locked=dayNum>active&&!posted;
  var html='';
  html+='<div class="week-pill">Day '+dayNum+' of '+TOTAL+'</div>';
  html+='<span class="loc-badge">'+d.loc+'</span>';
  if(locked){html+='<div style="clear:both;margin-top:8px"></div><div class="lock-box">🔒 <span><b>Locked</b> — complete Day '+(dayNum-1)+' first</span></div>';}
  if(posted){html+='<div style="clear:both;margin-top:8px"></div><div class="posted-badge">✓ Posted</div>';}

  // FEED
  html+='<div class="card"><div class="section-label">Feed photo · '+d.feed.time+'</div>';
  html+='<div class="photo-wrap feed"><img src="'+thumb(d.feed.id)+'" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=photo-no-img>Open in Drive</div>\'"></div>';
  html+='<div class="caption-box">'+d.feed.cap+'</div>';
  html+='<div class="tags">'+d.feed.tags+'</div>';
  html+='<button class="btn btn-gold" onclick="copy(\''+escQ(d.feed.cap)+'\',\'Caption copied\')">Copy caption</button>';
  html+='<button class="btn btn-outline" onclick="copy(\''+escQ(d.feed.tags)+'\',\'Hashtags copied\')">Copy hashtags</button>';
  html+='<button class="btn btn-ig" onclick="shareToIG(\''+d.feed.id+'\',\''+escQ(d.feed.cap)+'\')">Share to Instagram</button>';
  html+='<a class="btn btn-blue" href="'+driveUrl(d.feed.id)+'" target="_blank">Open in Drive ↗</a>';
  if(!posted&&!locked){
    html+='<button class="btn btn-green" onclick="markPosted('+dayNum+')">✓ Mark as posted</button>';
  }
  html+='</div>';

  if(!compact){
    // STORIES
    html+='<div class="card"><div class="section-label">Stories (3)</div>';
    d.stories.forEach(function(s,i){
      html+='<div class="story-item">';
      html+='<div class="story-num">Story 0'+(i+1)+(i===0?' — same photo as feed':'')+'<button class="copy-sm" onclick="copy(\''+escQ(s.cap)+'\',\'Story copied\')">Copy</button></div>';
      html+='<div class="photo-wrap story"><img src="'+thumb(s.id)+'" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=photo-no-img>Open Drive</div>\'"></div>';
      html+='<div class="story-cap-box">'+s.cap+'</div>';
      html+='<button class="btn btn-ig" style="margin-bottom:4px" onclick="shareToIG(\''+s.id+'\',\''+escQ(s.cap)+'\')">Share story</button>';
      html+='<a class="open-link" href="'+driveUrl(s.id)+'" target="_blank">Open in Drive ↗</a>';
      html+='</div>';
    });
    html+='</div>';

    // REEL (only if this post has one — photo-only / carousel posts skip it)
    if(d.reel){
      html+='<div class="card"><div class="section-label">Reel — same location as feed</div>';
      html+='<div style="font-size:10px;color:var(--muted2);margin-bottom:8px">'+d.reel.name+'</div>';
      html+='<div class="overlay-text">"'+d.reel.overlay+'"</div>';
      if(d.reel.song){
        html+='<div class="song-info">🎵 '+d.reel.song+'</div>';
        html+='<button class="btn btn-outline" onclick="copy(\''+escQ(d.reel.song)+'\',\'Song copied\')">Copy song name</button>';
      }
      html+='<button class="btn btn-outline" onclick="copy(\''+escQ(d.reel.overlay)+'\',\'Overlay copied\')">Copy overlay text</button>';
      html+='<a class="btn btn-blue" href="'+driveUrl(d.reel.id)+'" target="_blank">Open reel in Drive ↗</a>';
      if(d.reel.src) html+='<a class="btn btn-gold" href="'+d.reel.src+'" target="_blank">🎬 Use audio — open original reel ↗</a>';
      html+='</div>';
    }
  }
  return html;
}

function renderToday(){
  var dayNum=getActiveDay();var d=DAYS[dayNum];
  var today=new Date();
  document.getElementById('headerTitle').textContent='Day '+dayNum+' of '+TOTAL;
  document.getElementById('headerMeta').textContent=today.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+(d?' — '+d.loc:'');
  document.getElementById('today-content').innerHTML=buildDay(d,dayNum,false);
}

function renderCalendar(){
  var today=new Date();var month=today.getMonth();var year=today.getFullYear();
  var firstDay=new Date(year,month,1).getDay();var daysInMonth=new Date(year,month+1,0).getDate();
  var active=getActiveDay();var posted=getPosted();
  var html='<div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:14px">'+today.toLocaleDateString('en-GB',{month:'long',year:'numeric'})+'</div>';
  html+='<div class="cal-grid">';
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(function(d){html+='<div class="cal-dow">'+d+'</div>';});
  var startOffset=(firstDay===0?6:firstDay-1);
  for(var i=0;i<startOffset;i++)html+='<div class="cal-day empty"></div>';
  var s=new Date(START);s.setHours(0,0,0,0);
  for(var day=1;day<=daysInMonth;day++){
    var thisDate=new Date(year,month,day);thisDate.setHours(0,0,0,0);
    var diff=Math.floor((thisDate-s)/86400000)+1;
    var schedDay=((diff-1)%TOTAL)+1;
    var isToday=(day===today.getDate());
    var isPostedDay=posted['day_'+schedDay]&&diff>=1&&diff<=TOTAL;
    var isActive=schedDay===active&&diff>=1&&diff<=TOTAL;
    var isScheduled=diff>=1&&diff<=TOTAL&&!isPostedDay&&!isActive;
    var cls='cal-day';
    if(isActive)cls+=' active-day';else if(isToday)cls+=' today';else if(isPostedDay)cls+=' posted';else if(isScheduled)cls+=' scheduled';
    html+='<div class="'+cls+'" onclick="onCalClick('+schedDay+','+diff+')">'+day+(isPostedDay?'<div class="cal-dot"></div>':'')+'</div>';
  }
  html+='</div>';
  html+='<div class="cal-legend"><div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--gold)"></div>Today</div><div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green)"></div>Posted</div><div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(184,147,90,.3)"></div>Scheduled</div></div></div>';
  var pp=Object.keys(posted).filter(function(k){return posted[k]}).length;
  html+='<div class="card"><div class="section-label">Progress</div>';
  html+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px"><span style="font-size:13px;color:var(--muted)">Days posted</span><span style="font-size:18px;font-weight:300">'+pp+' / '+TOTAL+'</span></div>';
  html+='<div class="progress-bar"><div class="progress-fill" style="width:'+(pp/TOTAL*100)+'%"></div></div></div>';
  document.getElementById('cal-content').innerHTML=html;
}

function onCalClick(schedDay,diff){
  if(diff<1||diff>TOTAL)return;
  browseDayNum=schedDay;showPanel('browse',document.querySelectorAll('.nav-btn')[3]);renderBrowse();
}

function renderReels(){
  var html='';
  DAYS.slice(1).forEach(function(d,i){
    if(!d||!d.reel)return;
    var dayNum=i+1;
    html+='<div class="reel-card">';
    html+='<div class="reel-num">'+dayNum+'</div>';
    html+='<div class="reel-content">';
    html+='<div class="reel-title">'+d.loc+' · '+d.reel.name+'</div>';
    html+='<div class="reel-overlay">"'+d.reel.overlay+'"</div>';
    if(d.reel.song)html+='<div style="font-size:10px;color:var(--gold);font-weight:600;margin-bottom:6px">🎵 '+d.reel.song+'</div>';
    html+='<div style="display:flex;gap:6px">';
    html+='<button class="reel-copy" onclick="copy(\''+escQ(d.reel.overlay)+'\',\'Copied\')">Copy</button>';
    html+='<a href="'+driveUrl(d.reel.id)+'" target="_blank" style="background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-border);padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;text-decoration:none">Drive ↗</a>';
    html+='</div></div></div>';
  });
  document.getElementById('reels-content').innerHTML=html;
}

function changeDay(dir){browseDayNum=Math.min(Math.max(browseDayNum+dir,1),TOTAL);renderBrowse();}
function renderBrowse(){
  document.getElementById('browseLabel').textContent='Day '+browseDayNum+' — '+(DAYS[browseDayNum]?DAYS[browseDayNum].loc:'');
  document.getElementById('prevBtn').disabled=browseDayNum<=1;
  document.getElementById('nextBtn').disabled=browseDayNum>=TOTAL;
  document.getElementById('browse-content').innerHTML=buildDay(DAYS[browseDayNum],browseDayNum,false);
}
function showPanel(name,btn){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
  document.getElementById('panel-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='calendar')renderCalendar();
  if(name==='reels')renderReels();
  if(name==='browse')renderBrowse();
}
renderToday();
</script>
</body>
</html>

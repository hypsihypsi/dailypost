<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--surface:#111;--card:#161616;--border:#1e1e1e;--border2:#2a2a2a;
  --text:#f0f0f0;--muted:#666;--muted2:#444;
  --gold:#c9a96e;--gold-bg:rgba(201,169,110,0.1);--gold-border:rgba(201,169,110,0.2);
  --green:#4caf7d;--green-bg:rgba(76,175,125,0.1);--green-border:rgba(76,175,125,0.2);
  --blue:#6495ed;--blue-bg:rgba(100,149,237,0.1);--blue-border:rgba(100,149,237,0.2);
  --ig:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;min-height:100vh;padding-bottom:80px}
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-btn{flex:1;padding:12px 4px;border:none;background:none;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-btn i{display:block;font-size:18px;margin-bottom:3px}
.panel{display:none;padding:16px}
.panel.active{display:block}
.header{padding:16px 16px 0}
.header-date{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.header-title{font-size:20px;font-weight:300;color:var(--text);margin-bottom:2px}
.header-sub{font-size:11px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted2);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-label::after{content:'';flex:1;height:1px;background:var(--border)}
.photo-wrap{width:100%;border-radius:10px;overflow:hidden;background:#1a1a1a;margin-bottom:12px;position:relative}
.photo-wrap img{width:100%;display:block;object-fit:cover}
.photo-wrap.feed{aspect-ratio:4/5}
.photo-wrap.story{aspect-ratio:9/16}
.photo-no-img{display:flex;align-items:center;justify-content:center;width:100%;height:100%;min-height:80px;font-size:12px;color:var(--muted2);font-style:italic;padding:20px}
.textbox{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:13px;font-size:14px;line-height:1.65;font-style:italic;color:#ddd;margin-bottom:8px}
.textbox.story-cap{color:var(--muted);font-size:13px;border-style:dashed;font-style:italic}
.tags{font-size:11px;color:var(--gold);opacity:.6;margin-bottom:14px;line-height:1.9}
.btn{width:100%;padding:11px 16px;border-radius:10px;border:none;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-bottom:7px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;text-decoration:none}
.btn i{font-size:15px}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:#0a0a0a}
.btn-outline{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.btn-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.btn-ig{background:var(--ig);color:#fff}
.btn-notify{background:rgba(201,169,110,0.06);color:var(--muted);border:1px solid var(--border2);font-size:10px}
.story-item{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.story-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.story-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.story-num{font-size:9px;color:var(--muted2);font-weight:600;letter-spacing:.12em;text-transform:uppercase}
.copy-sm{background:none;border:1px solid var(--border2);color:var(--muted);padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer}
.open-link{display:block;text-align:center;font-size:10px;color:var(--blue);padding:5px 0;text-decoration:none;letter-spacing:.04em}
.posted-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.reel-item{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;width:100%;text-align:left;transition:.15s}
.reel-item:active{background:var(--green-bg)}
.reel-text{font-size:14px;font-style:italic;color:#ddd;flex:1}
.reel-icon{color:var(--muted2);margin-left:12px;font-size:16px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.05em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.cal-dow{font-size:9px;color:var(--muted2);text-align:center;font-weight:600;letter-spacing:.05em;padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:1px solid transparent;transition:.15s;position:relative;flex-direction:column;gap:2px}
.cal-day.empty{cursor:default}
.cal-day.today{border-color:var(--gold);color:var(--gold);font-weight:600}
.cal-day.posted{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.cal-day.scheduled{background:rgba(201,169,110,.06);color:var(--muted)}
.cal-day.active-day{background:var(--gold);color:#0a0a0a;font-weight:600}
.cal-dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.6}
.cal-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.cal-legend-dot{width:8px;height:8px;border-radius:50%}
.browse-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.browse-nav-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.browse-nav-btn:disabled{opacity:.2}
.browse-label{font-size:13px;color:var(--muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#0a0a0a;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.t-blue{background:var(--blue)}
.lock-banner{background:rgba(201,169,110,.06);border:1px solid var(--gold-border);border-radius:12px;padding:14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}
.lock-banner i{font-size:18px;color:var(--gold);flex-shrink:0;margin-top:1px}
.lock-banner-text{font-size:12px;color:var(--muted);line-height:1.5}
.lock-banner-text b{color:var(--gold);font-weight:600}
.time-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(201,169,110,.08);color:var(--gold);font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;margin-bottom:14px;letter-spacing:.05em}
.week-pill{display:inline-flex;align-items:center;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--muted);font-size:10px;padding:4px 10px;border-radius:20px;margin-bottom:12px;letter-spacing:.05em}
a.btn{box-sizing:border-box}
</style>

var TOTAL_DAYS=28;
var LIFESTYLE_REELS=["soft hours only 🕯️","mornings hit different lately","no plans, just vibes","the camera found me first","unbothered szn","quiet confidence is the loudest thing in the room","she woke up like this 🤍","staying in was the right call","not looking for attention, it just finds me","she's in her soft era 🌙"];

var START=new Date('2026-06-09');
var browseDayNum=1;

function getPosted(){try{return JSON.parse(localStorage.getItem('dp_posted')||'{}')}catch(e){return{}}}
function setPosted(k,v){var p=getPosted();p[k]=v;localStorage.setItem('dp_posted',JSON.stringify(p))}
function isPosted(k){return!!getPosted()[k]}
function dayKey(n){return'day_'+n}

function getCurrentDay(){
  var t=new Date();t.setHours(0,0,0,0);
  var s=new Date(START);s.setHours(0,0,0,0);
  var d=Math.floor((t-s)/86400000)+1;
  return Math.max(1,Math.min(((d-1)%TOTAL_DAYS)+1,TOTAL_DAYS));
}

function getActiveDay(){
  var cur=getCurrentDay();
  for(var i=1;i<=cur;i++){if(!isPosted(dayKey(i)))return i}
  return cur;
}

function copy(text,label,blue){
  var decoded=text.replace(/\\n/g,'\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(decoded).then(function(){showToast(label||'Copied',blue)}).catch(function(){fallbackCopy(decoded,label,blue)});
  }else{fallbackCopy(decoded,label,blue)}
}
function fallbackCopy(text,label,blue){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showToast(label||'Copied',blue)}catch(e){showToast('Long-press to copy')}
  document.body.removeChild(ta);
}
function shareToIG(photoId,caption){
  copy(caption,'Caption copied — save photo then post',true);
  setTimeout(function(){window.open(driveUrl(photoId),'_blank')},300);
}
function showToast(msg,blue){
  var t=document.getElementById('toast');
  var icon=document.getElementById('toastIcon');
  document.getElementById('toastMsg').textContent=msg;
  if(blue){t.classList.add('t-blue');icon.className='ti ti-brand-instagram'}
  else{t.classList.remove('t-blue');icon.className='ti ti-check'}
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2500);
}
function requestNotif(time,dayNum){
  if(!('Notification' in window)){showToast('Notifications not supported');return}
  Notification.requestPermission().then(function(p){
    if(p==='granted'){scheduleNotif(time,dayNum);showToast('Reminder set for '+time+' ✓')}
    else{showToast('Allow notifications in Settings')}
  });
}
function scheduleNotif(time,dayNum){
  var parts=time.split(':');
  var target=new Date();
  target.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);
  if(target<=new Date())target.setDate(target.getDate()+1);
  setTimeout(function(){
    if(Notification.permission==='granted'&&!isPosted(dayKey(dayNum))){
      new Notification('Time to post 📸',{body:'Day '+dayNum+': open Daily Post'});
    }
  },target-new Date());
}
function markPosted(dayNum){
  setPosted(dayKey(dayNum),true);
  renderToday();renderCalendar();
  showToast('Day '+dayNum+' posted ✓');
}
function escQ(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n')}

function buildDay(d,dayNum,compact){
  if(!d)return'<div style="text-align:center;padding:40px;color:var(--muted2);font-style:italic">No post for this day</div>';
  var posted=isPosted(dayKey(dayNum));
  var active=getActiveDay();
  var locked=dayNum>active&&!posted;
  var html='';

  html+='<div class="week-pill"><i class="ti ti-map-pin" style="font-size:12px;margin-right:4px"></i>'+d.week+'</div>';

  if(locked){
    html+='<div class="lock-banner"><i class="ti ti-lock"></i><div class="lock-banner-text"><b>Locked</b> — complete Day '+(dayNum-1)+' first to unlock this day.</div></div>';
  }
  if(posted)html+='<div class="posted-badge"><i class="ti ti-check"></i> Posted</div>';

  html+='<div class="card"><div class="card-label">Feed post</div>';
  html+='<div class="photo-wrap feed"><img src="'+thumb(d.feedId)+'" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=photo-no-img>Open in Drive to view</div>\'"></div>';
  html+='<div style="font-size:15px;color:var(--text);margin-bottom:4px">'+d.file+'</div>';
  html+='<div class="time-badge"><i class="ti ti-clock" style="font-size:13px"></i>Post at '+d.time+'</div>';
  html+='<div class="textbox">'+d.cap.replace(/\n/g,'<br>')+'</div>';
  html+='<div class="tags">'+d.tags+'</div>';
  html+='<button class="btn btn-gold" onclick="copy(\''+escQ(d.cap)+'\',\'Caption copied\')"><i class="ti ti-copy"></i>Copy caption</button>';
  html+='<button class="btn btn-outline" onclick="copy(\''+escQ(d.tags)+'\',\'Hashtags copied\')"><i class="ti ti-hash"></i>Copy hashtags</button>';
  html+='<button class="btn btn-ig" onclick="shareToIG(\''+d.feedId+'\',\''+escQ(d.cap)+'\')"><i class="ti ti-brand-instagram"></i>Share to Instagram</button>';
  html+='<a class="btn btn-blue" href="'+driveUrl(d.feedId)+'" target="_blank"><i class="ti ti-external-link"></i>Open in Drive</a>';
  if(!posted&&!locked){
    html+='<button class="btn btn-notify" onclick="requestNotif(\''+d.time+'\','+dayNum+')"><i class="ti ti-bell"></i>Remind me at '+d.time+'</button>';
    html+='<button class="btn btn-green" onclick="markPosted('+dayNum+')"><i class="ti ti-check"></i>Mark as posted</button>';
  }
  html+='</div>';

  if(!compact){
    html+='<div class="card"><div class="card-label">Stories (3)</div>';
    d.stories.forEach(function(s,i){
      html+='<div class="story-item">';
      html+='<div class="story-header"><span class="story-num">Story 0'+(i+1)+'</span><button class="copy-sm" onclick="copy(\''+escQ(s.cap)+'\',\'Story copied\')">Copy</button></div>';
      html+='<div class="photo-wrap story"><img src="'+thumb(s.photoId)+'" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=photo-no-img>Open in Drive</div>\'"></div>';
      html+='<div class="textbox story-cap">'+s.cap+'</div>';
      html+='<button class="btn btn-ig" style="margin-bottom:4px" onclick="shareToIG(\''+s.photoId+'\',\''+escQ(s.cap)+'\')"><i class="ti ti-brand-instagram"></i>Share story</button>';
      html+='<a class="open-link" href="'+driveUrl(s.photoId)+'" target="_blank"><i class="ti ti-external-link" style="font-size:12px"></i> Open in Drive</a>';
      html+='</div>';
    });
    html+='</div>';

    html+='<div class="card"><div class="card-label">Lifestyle reel</div>';
    html+='<div class="textbox">'+d.reel+'</div>';
    html+='<button class="btn btn-green" onclick="copy(\''+escQ(d.reel)+'\',\'Reel caption copied\')"><i class="ti ti-copy"></i>Copy reel caption</button>';
    html+='</div>';

    html+='<div class="card"><div class="card-label">Thirsttrap reels (4)</div>';
    html+='<div style="text-align:center;padding:16px;color:var(--muted2);font-size:13px;font-style:italic">Coming soon — generate first batch 🔒</div>';
    html+='</div>';
  }
  return html;
}

function renderToday(){
  var dayNum=getActiveDay();
  var d=DAYS[dayNum];
  var today=new Date();
  document.getElementById('headerDate').textContent=today.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('headerTitle').textContent='Day '+dayNum+' of '+TOTAL_DAYS;
  document.getElementById('headerSub').textContent=d?d.week:'';
  document.getElementById('today-content').innerHTML=buildDay(d,dayNum,false);
}

function renderCalendar(){
  var today=new Date();
  var month=today.getMonth();
  var year=today.getFullYear();
  var firstDay=new Date(year,month,1).getDay();
  var daysInMonth=new Date(year,month+1,0).getDate();
  var active=getActiveDay();
  var posted=getPosted();

  var html='<div class="card"><div class="cal-header"><div class="cal-title">'+today.toLocaleDateString('en-GB',{month:'long',year:'numeric'})+'</div></div>';
  html+='<div class="cal-grid">';
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(function(d){html+='<div class="cal-dow">'+d+'</div>'});
  var startOffset=(firstDay===0?6:firstDay-1);
  for(var i=0;i<startOffset;i++)html+='<div class="cal-day empty"></div>';

  var scheduleStart=new Date(START);scheduleStart.setHours(0,0,0,0);

  for(var day=1;day<=daysInMonth;day++){
    var thisDate=new Date(year,month,day);thisDate.setHours(0,0,0,0);
    var diff=Math.floor((thisDate-scheduleStart)/86400000)+1;
    var schedDay=((diff-1)%TOTAL_DAYS)+1;
    var isToday=(day===today.getDate());
    var isPostedDay=posted['day_'+schedDay]&&diff>=1&&diff<=TOTAL_DAYS;
    var isActive=schedDay===active&&diff>=1&&diff<=TOTAL_DAYS;
    var isScheduled=diff>=1&&diff<=TOTAL_DAYS&&!isPostedDay&&!isActive;

    var cls='cal-day';
    if(isActive)cls+=' active-day';
    else if(isToday)cls+=' today';
    else if(isPostedDay)cls+=' posted';
    else if(isScheduled)cls+=' scheduled';

    html+='<div class="'+cls+'" onclick="onCalDayClick('+schedDay+','+diff+')">'+day;
    if(isPostedDay)html+='<div class="cal-dot"></div>';
    html+='</div>';
  }
  html+='</div>';
  html+='<div class="cal-legend">';
  html+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--gold)"></div>Today</div>';
  html+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green)"></div>Posted</div>';
  html+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#333"></div>Scheduled</div>';
  html+='</div></div>';

  var progressPosted=0;
  for(var k in posted){if(isPosted(k))progressPosted++}

  html+='<div class="card"><div class="card-label">Progress</div>';
  html+='<div style="display:flex;justify-content:space-between;margin-bottom:8px">';
  html+='<span style="font-size:13px;color:var(--muted)">Days posted</span>';
  html+='<span style="font-size:13px;font-weight:600;color:var(--text)">'+progressPosted+' / '+TOTAL_DAYS+'</span></div>';
  html+='<div style="background:var(--border);border-radius:4px;height:4px;overflow:hidden">';
  html+='<div style="background:var(--green);height:100%;width:'+(progressPosted/TOTAL_DAYS*100)+'%;transition:.3s"></div></div>';
  html+='<div style="margin-top:12px;font-size:12px;color:var(--muted)">Current: Day '+active+' — '+(DAYS[active]?DAYS[active].week:'')+'</div>';
  html+='</div>';

  document.getElementById('cal-content').innerHTML=html;
}

function onCalDayClick(schedDay,diff){
  if(diff<1||diff>TOTAL_DAYS)return;
  browseDayNum=schedDay;
  showPanel('browse',document.querySelectorAll('.nav-btn')[3]);
  renderBrowse();
}

function showPanel(name,btn){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
  document.getElementById('panel-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='calendar')renderCalendar();
}

function changeDay(dir){
  browseDayNum=Math.min(Math.max(browseDayNum+dir,1),TOTAL_DAYS);
  renderBrowse();
}
function renderBrowse(){
  document.getElementById('dayLabel').textContent='Day '+browseDayNum+' of '+TOTAL_DAYS;
  document.getElementById('prevBtn').disabled=browseDayNum<=1;
  document.getElementById('nextBtn').disabled=browseDayNum>=TOTAL_DAYS;
  document.getElementById('browse-content').innerHTML=buildDay(DAYS[browseDayNum],browseDayNum,false);
}
function renderReels(){
  document.getElementById('lifestyle-list').innerHTML=LIFESTYLE_REELS.map(function(r){
    return'<button class="reel-item" onclick="copy(\''+escQ(r)+'\',\'Copied\')"><span class="reel-text">'+r+'</span><i class="ti ti-copy reel-icon"></i></button>';
  }).join('');
}
function init(){
  renderToday();
  renderReels();
  browseDayNum=getActiveDay();
  renderBrowse();
}
init();
</script>
